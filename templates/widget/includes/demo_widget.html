{% load i18n %}
<div class="widget-launcher-stack" id="morse-widget-launcher-stack">
    <span class="widget-launcher-label">{% trans "Support" %}</span>
    <button
        type="button"
        id="morse-widget-launcher"
        class="widget-launcher"
        aria-label="{% trans 'Chat with Morse' %}"
    >
        <span class="launcher-pulse" aria-hidden="true"></span>
        <span class="launcher-monogram" aria-hidden="true">M</span>
    </button>
</div>
<div id="morse-widget-frame" class="widget-frame hidden">
    <button id="morse-widget-close" class="widget-close" aria-label="{% trans 'Close chat' %}">×</button>
    <iframe
        id="morse-widget-iframe"
        title="{% trans 'Morse chat' %}"
        allow="microphone *"
    ></iframe>
</div>
<script>
(function() {
    const widgetKey = '{{ website.public_widget_key|escapejs }}';
    // Canonical parent-page key (this script runs on the host page, not in the iframe).
    const STORAGE_KEY = 'morse_visitor_id';

    function generateVisitorId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
            return window.crypto.randomUUID();
        }
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
            const r = (Math.random() * 16) | 0;
            const v = c === 'x' ? r : (r & 0x3) | 0x8;
            return v.toString(16);
        });
    }

    function getOrCreateVisitorId() {
        var existing = null;
        try {
            existing = window.localStorage.getItem(STORAGE_KEY);
        } catch (err) {
            console.warn('[Morse visitor] localStorage.getItem failed', err);
        }

        if (existing) {
            return existing;
        }

        var visitorId = generateVisitorId();

        try {
            window.localStorage.setItem(STORAGE_KEY, visitorId);
        } catch (err) {
            console.error('[Morse visitor] localStorage.setItem failed', err);
        }

        return visitorId;
    }

    const visitorId = getOrCreateVisitorId();
    const iframe = document.getElementById('morse-widget-iframe');
    const iframeUrl =
        '{% url "widget:chat" %}?key=' +
        encodeURIComponent(widgetKey) +
        '&visitor_id=' +
        encodeURIComponent(visitorId);
    iframe.src = iframeUrl;

    const launcher = document.getElementById('morse-widget-launcher');
    const frame = document.getElementById('morse-widget-frame');
    const closeBtn = document.getElementById('morse-widget-close');
    launcher.addEventListener('click', () => frame.classList.remove('hidden'));
    closeBtn.addEventListener('click', () => frame.classList.add('hidden'));
})();
</script>
