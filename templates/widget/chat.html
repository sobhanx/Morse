<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — {{ website.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/widget.css">
</head>
<body class="widget-body">
    <div class="widget-chat" id="widget-chat"
         data-widget-key="{{ widget_key }}">
        <div class="widget-header">
            <div class="widget-header-info">
                <div class="widget-avatar">M</div>
                <div>
                    <strong>{{ website.name }}</strong>
                    <span class="online-dot">We typically reply in minutes</span>
                </div>
            </div>
        </div>

        <div class="widget-messages" id="widget-messages"
             data-conversation-id="{{ conversation.id }}"
             data-widget-key="{{ widget_key }}">
            {% for msg in messages %}
            <div class="widget-message widget-message-{{ msg.sender_type }}" data-id="{{ msg.id }}">
                <div class="widget-bubble">{{ msg.content }}</div>
            </div>
            {% endfor %}
        </div>

        <div class="widget-prechat" id="widget-prechat" {% if contact.name %}style="display:none"{% endif %}>
            <p>Before we start, tell us a bit about yourself:</p>
            <input type="text" id="visitor-name" placeholder="Your name" value="{{ contact.name }}">
            <input type="email" id="visitor-email" placeholder="Your email" value="{{ contact.email }}">
            <button type="button" id="save-contact-btn" class="widget-btn">Continue</button>
        </div>

        <form class="widget-input" id="widget-form">
            <input type="text" id="widget-message-input" placeholder="Type a message..." autocomplete="off">
            <button type="button" id="widget-send-btn" class="widget-send-btn" aria-label="Send">➤</button>
        </form>

        <div class="widget-footer">
            <span class="visitor-id-label">Your ID: <code>{{ contact.visitor_id }}</code></span>
            <a href="{% url 'knowledge:help_center' %}?key={{ widget_key }}" target="_blank">Browse help articles</a>
        </div>
    </div>
    <script src="/static/js/widget.js?v=2"></script>
</body>
</html>
