{% extends "dashboard/base_dashboard.html" %}

{% block page_title %}Create website{% endblock %}

{% block dashboard_content %}
<div class="page-toolbar">
    <h2>Create a website</h2>
    <p class="text-muted">Add a new website to manage chat support, contacts, and knowledge base.</p>
</div>

<div class="website-create-card">
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="{% url 'websites:create' %}" class="website-create-form website-create-form--stacked">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Website name</label>
            <input type="text" id="name" name="name" placeholder="My Store" required autofocus>
        </div>
        <div class="form-group">
            <label for="domain">Domain (optional)</label>
            <input type="text" id="domain" name="domain" placeholder="example.com">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create website</button>
            <a href="{% url 'websites:list' %}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
