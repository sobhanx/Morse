{% load i18n %}
{% get_current_language as CURRENT_LANGUAGE %}
<div class="language-switcher">
    <form action="{% url 'set_language' %}" method="get" class="language-form">
        <input name="next" type="hidden" value="{{ request.get_full_path }}">
        <span class="language-icon" aria-hidden="true">🌐</span>
        <label class="sr-only" for="language-select-{{ switcher_id|default:'main' }}">{% trans "Language" %}</label>
        <select
            id="language-select-{{ switcher_id|default:'main' }}"
            name="language"
            class="language-select"
            onchange="this.form.submit()"
        >
            {% get_available_languages as AVAILABLE_LANGUAGES %}
            {% for lang_code, lang_name in AVAILABLE_LANGUAGES %}
            <option value="{{ lang_code }}"{% if lang_code == CURRENT_LANGUAGE %} selected{% endif %}>{{ lang_name }}</option>
            {% endfor %}
        </select>
    </form>
</div>
